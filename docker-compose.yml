version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gymai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/gymai
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  watcher:
    build: ./watcher
    command: python watcher.py
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/gymai
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  dispatcher:
    build: ./dispatcher
    command: python dispatcher.py
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/gymai
      REDIS_URL: redis://redis:6379
      TW_SID: your_twilio_sid
      TW_TOKEN: your_twilio_token
      TW_FROM: your_twilio_sender
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
